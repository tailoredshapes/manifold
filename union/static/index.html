<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>union</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: #2a2a2a;
      --accent: #4ade80;
      --accent-dim: #16a34a;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --error: #f87171;
      --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      background: var(--bg2);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    #search {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
      border-radius: 3px;
    }

    #search:focus { border-color: var(--accent-dim); }
    #search::placeholder { color: var(--text-dim); }

    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 160px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      padding: 8px 0;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      border-left: 2px solid transparent;
      transition: color 0.1s, background 0.1s;
      user-select: none;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--bg3);
    }

    .nav-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-width: 20px;
      text-align: center;
    }

    .nav-item.active .nav-badge {
      border-color: var(--accent-dim);
      color: var(--accent-dim);
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #entity-list-area {
      flex: 1;
      overflow-y: auto;
    }

    /* ── New record form ── */
    #new-form {
      display: none;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      flex-direction: column;
      gap: 8px;
    }

    #new-form.visible { display: flex; }

    #new-form .form-title {
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    #new-form .form-fields {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #new-form .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #new-form .field-row label {
      width: 120px;
      flex-shrink: 0;
      font-size: 11px;
    }

    #new-form .field-row label.required {
      color: var(--accent);
    }

    #new-form .field-row label.optional {
      color: var(--text-dim);
    }

    #new-form input, #new-form select, #new-form textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 3px;
    }

    #new-form input.required-field, #new-form select.required-field {
      border-color: var(--accent-dim);
    }

    #new-form input:focus, #new-form select:focus, #new-form textarea:focus {
      border-color: var(--accent);
    }

    #new-form .form-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Entity rows ── */
    #entity-list {
      list-style: none;
    }

    .entity-row {
      border-bottom: 1px solid var(--border);
    }

    .entity-row-header {
      display: flex;
      align-items: center;
      padding: 9px 20px;
      cursor: pointer;
      gap: 10px;
      transition: background 0.1s;
    }

    .entity-row-header:hover { background: var(--bg2); }

    .entity-row.expanded .entity-row-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .expand-icon {
      color: var(--text-dim);
      font-size: 10px;
      width: 10px;
      flex-shrink: 0;
    }

    .entity-row.expanded .expand-icon::before { content: '▼'; }
    .entity-row:not(.expanded) .expand-icon::before { content: '▶'; }

    .entity-label {
      flex: 1;
      font-weight: 500;
      font-size: 13px;
    }

    .entity-id {
      color: var(--text-dim);
      font-size: 10px;
    }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .badge.high { border-color: var(--error); color: var(--error); }
    .badge.medium { border-color: #f59e0b; color: #f59e0b; }
    .badge.low { border-color: var(--accent-dim); color: var(--accent-dim); }

    /* ── Detail panel ── */
    .entity-detail {
      display: none;
      padding: 14px 20px 14px 40px;
      background: var(--bg2);
      flex-direction: column;
      gap: 10px;
    }

    .entity-row.expanded .entity-detail { display: flex; }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .field-row label {
      width: 120px;
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 11px;
      padding-top: 5px;
    }

    .field-row input, .field-row select, .field-row textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 3px;
      resize: vertical;
    }

    .field-row input:focus, .field-row select:focus, .field-row textarea:focus {
      border-color: var(--accent-dim);
    }

    .field-row .readonly-val {
      flex: 1;
      font-size: 12px;
      padding-top: 4px;
      color: var(--text-dim);
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      padding-top: 2px;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    button:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dim);
      color: var(--bg);
    }

    button.danger:hover {
      border-color: var(--error);
      color: var(--error);
    }

    /* ── Status bar ── */
    #status-bar {
      flex-shrink: 0;
      padding: 4px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }

    #status-bar .shortcuts {
      display: flex;
      gap: 14px;
    }

    #status-bar .shortcuts kbd { color: var(--accent); }
    #status-error { color: var(--error); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    select option { background: var(--bg3); }
  </style>
</head>
<body>

<header>
  <h1>union</h1>
  <input id="search" type="text" placeholder="/ to search..." autocomplete="off" spellcheck="false" />
</header>

<div id="layout">
  <nav id="sidebar">
    <div class="nav-item active" data-entity="people">
      <span>people</span>
      <span class="nav-badge" id="badge-people">0</span>
    </div>
    <div class="nav-item" data-entity="teams">
      <span>teams</span>
      <span class="nav-badge" id="badge-teams">0</span>
    </div>
    <div class="nav-item" data-entity="members">
      <span>members</span>
      <span class="nav-badge" id="badge-members">0</span>
    </div>
    <div class="nav-item" data-entity="workOrders">
      <span>work orders</span>
      <span class="nav-badge" id="badge-workOrders">0</span>
    </div>
  </nav>

  <div id="content">
    <div id="new-form">
      <div class="form-title" id="new-form-title">new record</div>
      <div class="form-fields" id="new-form-fields"></div>
      <div class="form-hint">enter to save · esc to cancel</div>
    </div>
    <div id="entity-list-area">
      <ul id="entity-list"></ul>
    </div>
  </div>
</div>

<div id="status-bar">
  <span id="status-count">loading...</span>
  <span id="status-error"></span>
  <span class="shortcuts">
    <span><kbd>/</kbd> search</span>
    <span><kbd>n</kbd> new</span>
    <span><kbd>esc</kbd> cancel</span>
    <span><kbd>enter</kbd> save</span>
  </span>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
