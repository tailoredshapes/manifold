services:
  groundwork:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: groundwork
    container_name: groundwork
    restart: unless-stopped
    ports:
      - "3050:3000"
    volumes:
      - groundwork-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - UNION_URL=http://union:3000
      - UNION_PUBLIC_URL=${UNION_PUBLIC_URL:-https://union.tildarc.com}
      - CITYHALL_PUBLIC_URL=${CITYHALL_PUBLIC_URL:-https://cityhall.tildarc.com}
      - LOBBY_PUBLIC_URL=${LOBBY_PUBLIC_URL:-https://lobby.tildarc.com}
      - YARD_PUBLIC_URL=${YARD_PUBLIC_URL:-https://yard.tildarc.com}
      - LOBBY_PUBLIC_URL=${LOBBY_PUBLIC_URL:-https://lobby.tildarc.com}

  union:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: union
    container_name: union
    restart: unless-stopped
    ports:
      - "3051:3000"
    volumes:
      - union-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - GROUNDWORK_URL=http://groundwork:3000
      - CITYHALL_URL=http://cityhall:3000
      - GROUNDWORK_PUBLIC_URL=${GROUNDWORK_PUBLIC_URL:-https://groundwork.tildarc.com}
      - CITYHALL_PUBLIC_URL=${CITYHALL_PUBLIC_URL:-https://cityhall.tildarc.com}
      - LOBBY_PUBLIC_URL=${LOBBY_PUBLIC_URL:-https://lobby.tildarc.com}

  cityhall:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: cityhall
    container_name: cityhall
    restart: unless-stopped
    depends_on:
      - groundwork
      - union
    ports:
      - "3052:3000"
    volumes:
      - cityhall-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - GROUNDWORK_URL=http://groundwork:3000
      - UNION_URL=http://union:3000
      - CITYHALL_URL=http://cityhall:3000
      - YARD_URL=http://yard:3000
      - GROUNDWORK_PUBLIC_URL=${GROUNDWORK_PUBLIC_URL:-https://groundwork.tildarc.com}
      - UNION_PUBLIC_URL=${UNION_PUBLIC_URL:-https://union.tildarc.com}

  yard:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: yard
    container_name: yard
    restart: unless-stopped
    depends_on:
      - groundwork
      - union
      - cityhall
    ports:
      - "3053:3000"
    volumes:
      - yard-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - GROUNDWORK_URL=http://groundwork:3000
      - UNION_URL=http://union:3000
      - CITYHALL_URL=http://cityhall:3000
      - YARD_SELF_URL=http://yard:3000
      - GROUNDWORK_PUBLIC_URL=${GROUNDWORK_PUBLIC_URL:-https://groundwork.tildarc.com}
      - UNION_PUBLIC_URL=${UNION_PUBLIC_URL:-https://union.tildarc.com}
      - CITYHALL_PUBLIC_URL=${CITYHALL_PUBLIC_URL:-https://cityhall.tildarc.com}
      - LOBBY_PUBLIC_URL=${LOBBY_PUBLIC_URL:-https://lobby.tildarc.com}

  manifold-ingest:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: manifold-ingest
    container_name: manifold-ingest
    restart: unless-stopped
    ports:
      - "3054:3000"
    volumes:
      - manifold-ingest-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data

  manifold-lobby:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
      args:
        APP: manifold-lobby
    container_name: manifold-lobby
    restart: unless-stopped
    depends_on:
      - groundwork
      - union
      - cityhall
      - yard
    ports:
      - "3055:3000"
    volumes:
      - manifold-lobby-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - GROUNDWORK_URL=http://groundwork:3000
      - UNION_URL=http://union:3000
      - CITYHALL_URL=http://cityhall:3000
      - YARD_URL=http://yard:3000
      - MANIFOLD_USER_ID=lobby-system
      - MANIFOLD_USER_GROUPS=automation:lobby-derive
      - LOBBY_POLL_INTERVAL_SECONDS=60

  # Edge gateway. Injects synthetic identity headers in dev; in production
  # the customer's Caddyfile (see caddy/Caddyfile.azure-entra.example) maps
  # the customer's IdP into the canonical Manifold headers.
  edge:
    image: caddy:2-alpine
    container_name: manifold-edge
    restart: unless-stopped
    depends_on:
      - groundwork
      - union
      - cityhall
      - yard
    # Host 8090 → container 8080. Production *.tildarc.com routing bypasses
    # this Caddy entirely (system Caddy proxies straight to the per-app
    # container ports 3050-3055); manifold-edge here is dev path-style
    # access at http://localhost:8090/{groundwork,union,cityhall,yard}/*.
    # Moved off host 8080 to avoid colliding with cadvisor on the deploy host.
    ports:
      - "8090:8080"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  groundwork-data:
  union-data:
  cityhall-data:
  yard-data:
  manifold-ingest-data:
  manifold-lobby-data:
  caddy-data:
  caddy-config:
