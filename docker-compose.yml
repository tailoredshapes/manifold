services:
  groundwork:
    build:
      context: /tank/repos/tailoredshapes
      dockerfile: manifold/Dockerfile
      target: runtime
    container_name: groundwork
    restart: unless-stopped
    ports:
      - "3050:3000"
    volumes:
      - groundwork-data:/data
    environment:
      - PORT=3000
      - DATA_DIR=/data

volumes:
  groundwork-data:
