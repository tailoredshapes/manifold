type Dependency {
    id: ID
    deployable_id: String!
    service_id: String!
    protocol: String
    auth_method: String
    criticality: String
}
type Query {
    getById(id: ID, at: Float): Dependency
    getAll(at: Float): [Dependency]
    getByDeployableId(deployable_id: String, at: Float): [Dependency]
    getByServiceId(service_id: String, at: Float): [Dependency]
}
