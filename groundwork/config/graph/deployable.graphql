type Deployable {
    id: ID
    name: String!
    description: String
    repo_url: String
    team_id: String
    team: Team
}
type Team {
    id: ID
    name: String
    kind: String
    description: String
}
type Query {
    getById(id: ID, at: Float): Deployable
    getAll(at: Float): [Deployable]
    getByName(name: String, at: Float): [Deployable]
}
