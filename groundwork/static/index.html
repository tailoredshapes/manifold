<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>groundwork</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: #2a2a2a;
      --accent: #4ade80;
      --accent-dim: #16a34a;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --error: #f87171;
      --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      background: var(--bg2);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    header .hub-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 120ms;
    }
    header .hub-link:hover { color: var(--text); }
    header .hub-sep { color: var(--border); user-select: none; }

    #search {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
      border-radius: 3px;
    }

    #search:focus { border-color: var(--accent-dim); }
    #search::placeholder { color: var(--text-dim); }

    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 160px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      padding: 8px 0;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      border-left: 2px solid transparent;
      transition: color 0.1s, background 0.1s;
      user-select: none;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--bg3);
    }

    .nav-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 10px;
      border: 1px solid var(--border);
      min-width: 20px;
      text-align: center;
    }

    .nav-item.active .nav-badge {
      border-color: var(--accent-dim);
      color: var(--accent-dim);
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #entity-list-area {
      flex: 1;
      overflow-y: auto;
    }

    /* ── New record form ── */
    #new-form {
      display: none;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      flex-direction: column;
      gap: 8px;
    }

    #new-form.visible { display: flex; }

    #new-form .form-title {
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    #new-form .form-fields {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #new-form .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #new-form .field-row label {
      width: 120px;
      flex-shrink: 0;
      font-size: 11px;
    }

    #new-form .field-row label.required {
      color: var(--accent);
    }

    #new-form .field-row label.optional {
      color: var(--text-dim);
    }

    #new-form input, #new-form select, #new-form textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 3px;
    }

    #new-form input.required-field, #new-form select.required-field {
      border-color: var(--accent-dim);
    }

    #new-form input:focus, #new-form select:focus, #new-form textarea:focus {
      border-color: var(--accent);
    }

    #new-form .form-hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Entity rows ── */
    #entity-list {
      list-style: none;
    }

    .entity-row {
      border-bottom: 1px solid var(--border);
    }

    .entity-row-header {
      display: flex;
      align-items: center;
      padding: 9px 20px;
      cursor: pointer;
      gap: 10px;
      transition: background 0.1s;
    }

    .entity-row-header:hover { background: var(--bg2); }

    .entity-row.expanded .entity-row-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .expand-icon {
      color: var(--text-dim);
      font-size: 10px;
      width: 10px;
      flex-shrink: 0;
    }

    .entity-row.expanded .expand-icon::before { content: '▼'; }
    .entity-row:not(.expanded) .expand-icon::before { content: '▶'; }

    .entity-label {
      flex: 1;
      font-weight: 500;
      font-size: 13px;
    }

    .entity-id {
      color: var(--text-dim);
      font-size: 10px;
    }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .badge.high { border-color: var(--error); color: var(--error); }
    .badge.medium { border-color: #f59e0b; color: #f59e0b; }
    .badge.low { border-color: var(--accent-dim); color: var(--accent-dim); }

    /* Deployment-status dot — circular indicator next to row label.
       Colour is carried entirely through the semantic modifier class
       (.operational/.degraded/.down/.unknown) so callers never inline-style. */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
      position: relative;
    }
    .status-dot.operational { background: #16a34a; box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.25); }
    .status-dot.degraded    { background: #d97706; box-shadow: 0 0 0 1px rgba(217, 119, 6, 0.25); }
    .status-dot.down        { background: #dc2626; box-shadow: 0 0 0 1px rgba(220, 38, 38, 0.25); }
    .status-dot.unknown     { background: #9ca3af; box-shadow: 0 0 0 1px rgba(156, 163, 175, 0.25); }

    /* Visually hidden but exposed to assistive tech. Used inside status-dot
       to announce the deployment state on screen readers. */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Header column-filter (deployment status). Sits next to the search
       box, hidden when not viewing deployables. */
    .header-filter {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .header-filter[hidden] { display: none; }
    .header-filter-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    #status-filter {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 3px;
      cursor: pointer;
    }
    #status-filter:focus { border-color: var(--accent-dim); }

    /* ── Detail panel ── */
    .entity-detail {
      display: none;
      padding: 14px 20px 14px 40px;
      background: var(--bg2);
      flex-direction: column;
      gap: 10px;
    }

    .entity-row.expanded .entity-detail { display: flex; }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .field-row label {
      width: 120px;
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 11px;
      padding-top: 5px;
    }

    .field-row input, .field-row select, .field-row textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      border-radius: 3px;
      resize: vertical;
    }

    .field-row input:focus, .field-row select:focus, .field-row textarea:focus {
      border-color: var(--accent-dim);
    }

    .field-row .readonly-val {
      flex: 1;
      font-size: 12px;
      padding-top: 4px;
      color: var(--text-dim);
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      padding-top: 2px;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    button:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dim);
      color: var(--bg);
    }

    button.danger:hover {
      border-color: var(--error);
      color: var(--error);
    }

    /* ── Status bar ── */
    #status-bar {
      flex-shrink: 0;
      padding: 4px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }

    #status-bar .shortcuts {
      display: flex;
      gap: 14px;
    }

    #status-bar .shortcuts kbd { color: var(--accent); }
    #status-error { color: var(--error); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    select option { background: var(--bg3); }

    /* ── Graph view (Cytoscape) ──
       The graph tab is a separate "screen" inside #content. When active, the
       entity list area + new-record form are hidden and #screen-graph fills
       the available space. #cy is the Cytoscape canvas; the side panel
       slides in when a node is focused. */
    #screen-graph {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    #screen-graph.visible { display: flex; }

    .graph-toolbar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .graph-toolbar .filter-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .graph-toolbar .filter-group label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
    }
    .graph-toolbar select,
    .graph-toolbar input[type="checkbox"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      outline: none;
    }
    .graph-toolbar select {
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
    }
    .graph-toolbar select:focus { border-color: var(--accent-dim); }

    .graph-canvas-wrap {
      flex: 1;
      position: relative;
      display: flex;
      overflow: hidden;
    }
    #cy {
      flex: 1;
      background: var(--bg);
      min-height: 0;
      min-width: 0;
    }
    #cy[hidden] { display: none; }

    /* Table-view fallback — keyboard-accessible alternative to the canvas.
       Same data, different surface. Hidden when the canvas is showing. */
    #graph-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 12px 20px;
    }
    #graph-table-wrap[hidden] { display: none; }
    #graph-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    #graph-table th, #graph-table td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    #graph-table th {
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.04em;
      background: var(--bg2);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }
    #graph-table tbody tr:hover { background: var(--bg2); }
    #graph-table td.numeric { text-align: right; font-variant-numeric: tabular-nums; }

    .graph-detail {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--bg2);
      padding: 14px 16px;
      overflow-y: auto;
      font-size: 12px;
    }
    .graph-detail[hidden] { display: none; }
    .graph-detail h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      word-break: break-word;
    }
    .graph-detail dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      margin-bottom: 12px;
    }
    .graph-detail dt {
      color: var(--text-dim);
      font-size: 11px;
    }
    .graph-detail dd {
      color: var(--text);
      font-size: 11px;
      word-break: break-word;
    }
    .graph-detail h3 {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 10px 0 4px;
    }
    .graph-detail ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .graph-detail li {
      padding: 3px 0;
      color: var(--text);
      border-bottom: 1px dotted var(--border);
    }
    .graph-detail li:last-child { border-bottom: 0; }
    .graph-detail .empty-list {
      color: var(--text-dim);
      font-style: italic;
      font-size: 11px;
    }
  </style>
</head>
<body>

<header>
  <a class="hub-link" href="https://manifold.tildarc.com">Manifold</a>
  <span class="hub-sep" aria-hidden="true">·</span>
  <h1>groundwork</h1>
  <input id="search" type="text" placeholder="/ to search..." autocomplete="off" spellcheck="false" />
  <label id="status-filter-wrap" class="header-filter" hidden>
    <span class="header-filter-label">status</span>
    <select id="status-filter" aria-label="filter deployables by deployment status">
      <option value="">all</option>
      <option value="operational">operational</option>
      <option value="degraded">degraded</option>
      <option value="down">down</option>
      <option value="unknown">unknown</option>
    </select>
  </label>
</header>

<div id="layout">
  <nav id="sidebar">
    <div class="nav-item active" data-entity="deployables">
      <span>deployables</span>
      <span class="nav-badge" id="badge-deployables">0</span>
    </div>
    <div class="nav-item" data-entity="exposes">
      <span>exposes</span>
      <span class="nav-badge" id="badge-exposes">0</span>
    </div>
    <div class="nav-item" data-entity="services">
      <span>services</span>
      <span class="nav-badge" id="badge-services">0</span>
    </div>
    <div class="nav-item" data-entity="dependencies">
      <span>dependencies</span>
      <span class="nav-badge" id="badge-dependencies">0</span>
    </div>
    <div class="nav-item" data-entity="contracts">
      <span>contracts</span>
      <span class="nav-badge" id="badge-contracts">0</span>
    </div>
    <div class="nav-item" data-entity="slas">
      <span>slas</span>
      <span class="nav-badge" id="badge-slas">0</span>
    </div>
    <div class="nav-item" data-entity="graph" role="link" tabindex="0">
      <span>graph</span>
    </div>
  </nav>

  <div id="content">
    <div id="new-form">
      <div class="form-title" id="new-form-title">new record</div>
      <div class="form-fields" id="new-form-fields"></div>
      <div class="form-hint">enter to save · esc to cancel</div>
    </div>
    <div id="entity-list-area">
      <ul id="entity-list"></ul>
    </div>
    <section id="screen-graph" aria-label="dependency graph">
      <div class="graph-toolbar" role="toolbar" aria-label="graph filters">
        <span class="filter-group" role="group" aria-label="filter by criticality">
          <span>criticality:</span>
          <label><input type="checkbox" data-filter-crit="high" checked> high</label>
          <label><input type="checkbox" data-filter-crit="medium" checked> medium</label>
          <label><input type="checkbox" data-filter-crit="low" checked> low</label>
        </span>
        <span class="filter-group">
          <label for="filter-team">team:</label>
          <select id="filter-team" aria-label="filter by team">
            <option value="">all teams</option>
          </select>
        </span>
        <button id="reset-graph" type="button">reset view</button>
        <button id="toggle-graph-view" type="button" aria-pressed="false">view as table</button>
      </div>
      <div class="graph-canvas-wrap">
        <div id="cy" role="img" aria-label="dependency graph canvas"></div>
        <div id="graph-table-wrap" hidden>
          <table id="graph-table" aria-label="deployables with dependency counts">
            <thead>
              <tr>
                <th data-sort="name" scope="col">deployable</th>
                <th data-sort="status" scope="col">status</th>
                <th data-sort="team" scope="col">team</th>
                <th data-sort="outgoing" scope="col" class="numeric">depends on</th>
                <th data-sort="incoming" scope="col" class="numeric">depended on by</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <aside id="graph-detail" class="graph-detail" hidden aria-live="polite">
        </aside>
      </div>
    </section>
  </div>
</div>

<div id="status-bar">
  <span id="status-count">loading...</span>
  <span id="status-error"></span>
  <span class="shortcuts">
    <span><kbd>/</kbd> search</span>
    <span><kbd>n</kbd> new</span>
    <span><kbd>esc</kbd> cancel</span>
    <span><kbd>enter</kbd> save</span>
  </span>
</div>

<script src="/static/vendor/cytoscape.min.js"></script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
