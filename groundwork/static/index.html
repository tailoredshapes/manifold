<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groundwork</title>

  <!-- Shared Manifold UI kit: design tokens + primitive component styles. -->
  <link rel="stylesheet" href="/static/manifold-ui.css" />

  <style>
    /* Groundwork redesigned around the deployable as the unit of attention.
       Catalog (home) lists deployables as cards; clicking opens a detail
       view that aggregates services exposed, dependencies, dependents,
       test environments, and a focused subgraph. The other entity types
       (services, exposes, dependencies, contracts, slas) live behind an
       Admin menu for direct CRUD. */

    /* ── Header tweaks ────────────────────────────────────────────────── */
    #search { width: 280px; }

    /* The deployment-status column filter lives next to the search box on
       the Catalog screen only; hide it everywhere else. */
    .header-filter {
      display: none;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header-filter.visible { display: flex; }
    .header-filter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    #status-filter {
      font-size: 13px;
      padding: 6px 10px;
    }

    /* ── Deployable card (Catalog) ────────────────────────────────────── */
    .deployable-card {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 10px;
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .deployable-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-strong);
    }
    .deployable-card .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .deployable-card .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .deployable-card .desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.45;
      /* Clamp to two lines so cards stay uniform-height. */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .deployable-card .stats {
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .deployable-card .stats .stat strong {
      color: var(--text);
      font-weight: 600;
      margin-right: 3px;
    }
    .deployable-card .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      font-size: 12px;
    }
    .deployable-card .team {
      color: var(--text-muted);
    }
    .deployable-card .id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-soft);
    }

    /* ── Deployment-status dot ────────────────────────────────────────── */
    .status-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-soft);
      box-shadow: 0 0 0 2px var(--surface);
      vertical-align: middle;
    }
    .status-dot.operational { background: var(--success); }
    .status-dot.degraded    { background: var(--warn); }
    .status-dot.down        { background: var(--danger); }
    .status-dot.unknown     { background: var(--text-soft); }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Deployable detail screen ─────────────────────────────────────── */
    .back-link {
      display: inline-block;
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      margin-bottom: 18px;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--text); }
    .back-link::before { content: '← '; }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .detail-header .title-block h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    .detail-header .meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 8px;
    }
    .detail-header .meta a { color: var(--text-muted); }
    .detail-header .meta a:hover { color: var(--text); }
    .detail-header .description {
      margin-top: 12px;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 15px;
      color: var(--text);
      line-height: 1.55;
      max-width: 60ch;
    }
    .detail-header .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .detail-section {
      margin-bottom: 36px;
    }
    .detail-section > h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .detail-section > h2 .section-add {
      font-size: 11px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }
    .detail-section .lede {
      font-size: 13px;
      color: var(--text-soft);
      font-style: italic;
      padding: 4px 0;
    }

    /* ── Relationship list (services / dependencies / dependents) ─────── */
    .relationship-list {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }
    .relationship-list .row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      column-gap: 14px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .relationship-list .row:last-child { border-bottom: 0; }
    .relationship-list .row .target {
      font-weight: 500;
      color: var(--text);
    }
    .relationship-list .row .target a { color: var(--text); }
    .relationship-list .row .target .target-meta {
      display: block;
      font-weight: 400;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .relationship-list .row .pill,
    .relationship-list .row .badge {
      justify-self: end;
    }
    .relationship-list .row button.row-del {
      background: transparent;
      border: none;
      color: var(--text-soft);
      padding: 4px 6px;
      font-size: 14px;
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .relationship-list .row button.row-del:hover {
      color: var(--danger);
      background: var(--danger-soft);
    }

    /* Criticality badge modifiers (used in dependencies + graph table) */
    .badge.high   { color: var(--danger);  border-color: var(--danger);  background: var(--danger-soft); }
    .badge.medium { color: var(--warn);    border-color: var(--warn);    background: var(--warn-soft); }
    .badge.low    { color: var(--success); border-color: var(--success); background: var(--success-soft); }

    /* ── Focused subgraph on detail page ──────────────────────────────── */
    .dep-mini-graph {
      height: 320px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Admin screen (entity-typed CRUD lists) ───────────────────────── */
    .admin-list {
      list-style: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .admin-list .entity-row {
      border-bottom: 1px solid var(--border);
    }
    .admin-list .entity-row:last-child { border-bottom: 0; }
    .admin-list .entity-row-header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      gap: 12px;
      transition: background var(--transition);
    }
    .admin-list .entity-row-header:hover { background: var(--surface-alt); }
    .admin-list .entity-row.expanded .entity-row-header {
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
    }
    .admin-list .expand-icon {
      color: var(--text-soft);
      font-size: 10px;
      width: 12px;
      flex-shrink: 0;
    }
    .admin-list .entity-row.expanded .expand-icon::before { content: '▼'; }
    .admin-list .entity-row:not(.expanded) .expand-icon::before { content: '▶'; }
    .admin-list .entity-label {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: var(--text);
    }
    .admin-list .entity-id {
      color: var(--text-soft);
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .admin-list .entity-detail {
      display: none;
      padding: 16px 20px 18px 44px;
      background: var(--surface-alt);
      flex-direction: column;
      gap: 12px;
    }
    .admin-list .entity-row.expanded .entity-detail { display: flex; }
    .admin-list .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .admin-list .field-row label {
      width: 140px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
      padding-top: 6px;
    }
    .admin-list .field-row input,
    .admin-list .field-row select,
    .admin-list .field-row textarea {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
    }
    .admin-list .field-row textarea { resize: vertical; min-height: 60px; }
    .admin-list .field-row .readonly-val {
      flex: 1;
      font-size: 13px;
      padding-top: 5px;
      color: var(--text-muted);
    }
    .admin-list .detail-actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    /* ── Graph screen (full Cytoscape view, preserved) ────────────────── */
    .graph-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .graph-toolbar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      border-radius: var(--radius) var(--radius) 0 0;
      flex-wrap: wrap;
    }
    .graph-toolbar .filter-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .graph-toolbar .filter-group label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .graph-toolbar select { font-size: 12px; padding: 4px 8px; }

    .graph-canvas-wrap {
      display: flex;
      border: 1px solid var(--border);
      border-top: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      background: var(--surface);
      height: calc(100vh - 280px);
      min-height: 480px;
    }
    #cy {
      flex: 1;
      background: var(--bg);
      min-height: 0;
      min-width: 0;
    }
    #cy[hidden] { display: none; }

    #graph-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 12px 20px;
    }
    #graph-table-wrap[hidden] { display: none; }
    #graph-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #graph-table th, #graph-table td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    #graph-table th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface-alt);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }
    #graph-table tbody tr:hover { background: var(--surface-alt); }
    #graph-table td.numeric { text-align: right; font-variant-numeric: tabular-nums; }

    .graph-detail {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 18px;
      overflow-y: auto;
      font-size: 13px;
    }
    .graph-detail[hidden] { display: none; }
    .graph-detail h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      word-break: break-word;
    }
    .graph-detail dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 12px;
      margin-bottom: 14px;
    }
    .graph-detail dt {
      color: var(--text-muted);
      font-size: 12px;
    }
    .graph-detail dd {
      color: var(--text);
      font-size: 12px;
      word-break: break-word;
    }
    .graph-detail h3 {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 12px 0 6px;
    }
    .graph-detail ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .graph-detail li {
      padding: 4px 0;
      color: var(--text);
      font-size: 12px;
      border-bottom: 1px dotted var(--border);
    }
    .graph-detail li:last-child { border-bottom: 0; }
    .graph-detail .empty-list {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="hub-row">
        <a class="hub-link" href="https://manifold.tildarc.com">Manifold</a>
        <span class="hub-sep" aria-hidden="true">·</span>
        <span>groundwork</span>
      </div>
      <h1>Groundwork</h1>
      <span class="subtitle">service catalog</span>
    </div>

    <nav class="tabs" id="primary-nav">
      <button class="tab active" data-screen="catalog">Catalog</button>
      <button class="tab" data-screen="graph">Graph</button>
    </nav>

    <div class="header-actions">
      <input id="search" type="search" placeholder="Search ( / )" autocomplete="off" spellcheck="false" />
      <label id="status-filter-wrap" class="header-filter">
        <span class="header-filter-label">status</span>
        <select id="status-filter" aria-label="filter deployables by deployment status">
          <option value="">all</option>
          <option value="operational">operational</option>
          <option value="degraded">degraded</option>
          <option value="down">down</option>
          <option value="unknown">unknown</option>
        </select>
      </label>
      <button id="btn-new" class="primary" title="New (n)">New</button>
      <div class="menu-host">
        <button id="btn-settings" class="ghost">Admin</button>
        <div id="settings-menu" class="menu" role="menu">
          <div class="menu-heading">Backstage CRUD</div>
          <button class="menu-item" data-screen="admin/services">Services</button>
          <button class="menu-item" data-screen="admin/exposes">Exposes</button>
          <button class="menu-item" data-screen="admin/dependencies">Dependencies</button>
          <button class="menu-item" data-screen="admin/contracts">Contracts</button>
          <button class="menu-item" data-screen="admin/slas">SLAs</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="page" id="screen-root"></div>
</main>

<footer class="shortcuts">
  <span><kbd>/</kbd> search</span>
  <span><kbd>n</kbd> new</span>
  <span><kbd>esc</kbd> back</span>
  <span id="footer-meta" style="margin-left:auto"></span>
</footer>

<div id="status-strip" role="status" aria-live="polite"></div>

<script src="/static/vendor/cytoscape.min.js"></script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
