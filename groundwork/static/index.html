<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groundwork</title>

  <!-- Shared Manifold UI kit: design tokens + primitive component styles. -->
  <link rel="stylesheet" href="/static/manifold-ui.css" />

  <style>
    /* Groundwork joins the editorial-paper family (was dark terminal). The
       sidebar + entity-list layout is preserved — appropriate for the 7-way
       entity switching — but the surfaces, type, and accent now match yard,
       union, cityhall, and lobby. */

    /* Groundwork keeps its full-height shell rather than the topbar+main
       pattern; the body override below pins it to the viewport so the
       sidebar can scroll independently of the entity list. */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; min-height: 0; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      background: var(--surface);
    }

    header .hub-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color var(--transition);
    }
    header .hub-link:hover { color: var(--ink); }
    header .hub-sep { color: var(--border); user-select: none; }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
    }

    #search {
      flex: 1;
      max-width: 380px;
      margin-left: 12px;
    }

    /* Header column-filter (deployment status). Sits next to the search
       box, hidden when not viewing deployables. */
    .header-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header-filter[hidden] { display: none; }
    .header-filter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    #status-filter {
      font-size: 13px;
      padding: 6px 10px;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    #sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 18px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      border-left: 2px solid transparent;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      user-select: none;
    }
    .nav-item:hover {
      color: var(--text);
      background: var(--surface-alt);
    }
    .nav-item.active {
      color: var(--text);
      border-left-color: var(--ink);
      background: var(--surface-alt);
    }

    .nav-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      min-width: 22px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .nav-item.active .nav-badge {
      border-color: var(--border-strong);
      color: var(--text);
    }

    /* ── Main content ───────────────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      background: var(--bg);
    }

    #entity-list-area {
      flex: 1;
      overflow-y: auto;
    }

    /* ── New record (inline; groundwork pattern, not a modal) ───────────── */
    #new-form {
      display: none;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-alt);
      flex-direction: column;
      gap: 10px;
    }
    #new-form.visible { display: flex; }

    #new-form .form-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    #new-form .form-fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #new-form .field-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #new-form .field-row label {
      width: 140px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    #new-form .field-row label.required {
      color: var(--text);
      font-weight: 500;
    }

    #new-form .field-row label.optional {
      color: var(--text-muted);
    }

    #new-form input, #new-form select, #new-form textarea {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
    }

    #new-form input.required-field, #new-form select.required-field {
      border-color: var(--border-strong);
    }

    #new-form .form-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Entity list rows ───────────────────────────────────────────────── */
    #entity-list {
      list-style: none;
      background: var(--surface);
    }

    .entity-row {
      border-bottom: 1px solid var(--border);
    }

    .entity-row-header {
      display: flex;
      align-items: center;
      padding: 10px 24px;
      cursor: pointer;
      gap: 12px;
      transition: background var(--transition);
    }
    .entity-row-header:hover { background: var(--surface-alt); }
    .entity-row.expanded .entity-row-header {
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
    }

    .expand-icon {
      color: var(--text-soft);
      font-size: 10px;
      width: 12px;
      flex-shrink: 0;
    }
    .entity-row.expanded .expand-icon::before { content: '▼'; }
    .entity-row:not(.expanded) .expand-icon::before { content: '▶'; }

    .entity-label {
      flex: 1;
      font-weight: 500;
      font-size: 14px;
      color: var(--text);
    }

    .entity-id {
      color: var(--text-soft);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* Criticality badge — overrides the shared .badge base */
    .badge.high   { color: var(--danger);  border-color: var(--danger);  background: var(--danger-soft); }
    .badge.medium { color: var(--warn);    border-color: var(--warn);    background: var(--warn-soft); }
    .badge.low    { color: var(--success); border-color: var(--success); background: var(--success-soft); }

    /* Deployment-status dot — circular indicator next to row label. Colour
       carried through the semantic modifier class only. */
    .status-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-soft);
      box-shadow: 0 0 0 2px var(--surface);
    }
    .status-dot.operational { background: var(--success); }
    .status-dot.degraded    { background: var(--warn); }
    .status-dot.down        { background: var(--danger); }
    .status-dot.unknown     { background: var(--text-soft); }

    /* Visually hidden but exposed to assistive tech (announces the
       deployment-status label inside .status-dot). */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Entity detail (expanded row) ───────────────────────────────────── */
    .entity-detail {
      display: none;
      padding: 16px 24px 18px 48px;
      background: var(--surface-alt);
      flex-direction: column;
      gap: 12px;
    }
    .entity-row.expanded .entity-detail { display: flex; }

    /* `.field-row` is also used inside entity-detail (not just #new-form),
       but the layout here is align-start (multiline values). */
    .entity-detail .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .entity-detail .field-row label {
      width: 140px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
      padding-top: 6px;
    }
    .entity-detail .field-row input,
    .entity-detail .field-row select,
    .entity-detail .field-row textarea {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
    }
    .entity-detail .field-row textarea { resize: vertical; min-height: 60px; }
    .entity-detail .field-row .readonly-val {
      flex: 1;
      font-size: 13px;
      padding-top: 5px;
      color: var(--text-muted);
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    /* ── Status bar ─────────────────────────────────────────────────────── */
    #status-bar {
      flex-shrink: 0;
      padding: 8px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
    }
    #status-bar .shortcuts {
      display: flex;
      gap: 16px;
    }
    #status-bar .shortcuts kbd {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--text);
    }
    #status-error { color: var(--danger); font-weight: 500; }

    .empty-state {
      padding: 56px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Graph view (Cytoscape) ─────────────────────────────────────────── */
    #screen-graph {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: var(--surface);
    }
    #screen-graph.visible { display: flex; }

    .graph-toolbar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-alt);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .graph-toolbar .filter-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .graph-toolbar .filter-group label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
    }
    .graph-toolbar select {
      font-size: 12px;
      padding: 4px 8px;
    }

    .graph-canvas-wrap {
      flex: 1;
      position: relative;
      display: flex;
      overflow: hidden;
    }
    #cy {
      flex: 1;
      background: var(--bg);
      min-height: 0;
      min-width: 0;
    }
    #cy[hidden] { display: none; }

    /* Table-view fallback — keyboard-accessible alternative to the canvas.
       Same data, different surface. */
    #graph-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 12px 20px;
    }
    #graph-table-wrap[hidden] { display: none; }
    #graph-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #graph-table th, #graph-table td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    #graph-table th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface-alt);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }
    #graph-table tbody tr:hover { background: var(--surface-alt); }
    #graph-table td.numeric { text-align: right; font-variant-numeric: tabular-nums; }

    .graph-detail {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 18px;
      overflow-y: auto;
      font-size: 13px;
    }
    .graph-detail[hidden] { display: none; }
    .graph-detail h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      word-break: break-word;
    }
    .graph-detail dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 12px;
      margin-bottom: 14px;
    }
    .graph-detail dt {
      color: var(--text-muted);
      font-size: 12px;
    }
    .graph-detail dd {
      color: var(--text);
      font-size: 12px;
      word-break: break-word;
    }
    .graph-detail h3 {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 12px 0 6px;
    }
    .graph-detail ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .graph-detail li {
      padding: 4px 0;
      color: var(--text);
      font-size: 12px;
      border-bottom: 1px dotted var(--border);
    }
    .graph-detail li:last-child { border-bottom: 0; }
    .graph-detail .empty-list {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <a class="hub-link" href="https://manifold.tildarc.com">Manifold</a>
  <span class="hub-sep" aria-hidden="true">·</span>
  <h1>Groundwork</h1>
  <input id="search" type="search" placeholder="Search ( / )" autocomplete="off" spellcheck="false" />
  <label id="status-filter-wrap" class="header-filter" hidden>
    <span class="header-filter-label">status</span>
    <select id="status-filter" aria-label="filter deployables by deployment status">
      <option value="">all</option>
      <option value="operational">operational</option>
      <option value="degraded">degraded</option>
      <option value="down">down</option>
      <option value="unknown">unknown</option>
    </select>
  </label>
</header>

<div id="layout">
  <nav id="sidebar">
    <div class="nav-item active" data-entity="deployables">
      <span>deployables</span>
      <span class="nav-badge" id="badge-deployables">0</span>
    </div>
    <div class="nav-item" data-entity="exposes">
      <span>exposes</span>
      <span class="nav-badge" id="badge-exposes">0</span>
    </div>
    <div class="nav-item" data-entity="services">
      <span>services</span>
      <span class="nav-badge" id="badge-services">0</span>
    </div>
    <div class="nav-item" data-entity="dependencies">
      <span>dependencies</span>
      <span class="nav-badge" id="badge-dependencies">0</span>
    </div>
    <div class="nav-item" data-entity="contracts">
      <span>contracts</span>
      <span class="nav-badge" id="badge-contracts">0</span>
    </div>
    <div class="nav-item" data-entity="slas">
      <span>slas</span>
      <span class="nav-badge" id="badge-slas">0</span>
    </div>
    <div class="nav-item" data-entity="graph" role="link" tabindex="0">
      <span>graph</span>
    </div>
  </nav>

  <div id="content">
    <div id="new-form">
      <div class="form-title" id="new-form-title">new record</div>
      <div class="form-fields" id="new-form-fields"></div>
      <div class="form-hint">enter to save · esc to cancel</div>
    </div>
    <div id="entity-list-area">
      <ul id="entity-list"></ul>
    </div>
    <section id="screen-graph" aria-label="dependency graph">
      <div class="graph-toolbar" role="toolbar" aria-label="graph filters">
        <span class="filter-group" role="group" aria-label="filter by criticality">
          <span>criticality:</span>
          <label><input type="checkbox" data-filter-crit="high" checked> high</label>
          <label><input type="checkbox" data-filter-crit="medium" checked> medium</label>
          <label><input type="checkbox" data-filter-crit="low" checked> low</label>
        </span>
        <span class="filter-group">
          <label for="filter-team">team:</label>
          <select id="filter-team" aria-label="filter by team">
            <option value="">all teams</option>
          </select>
        </span>
        <button id="reset-graph" type="button">reset view</button>
        <button id="toggle-graph-view" type="button" aria-pressed="false">view as table</button>
      </div>
      <div class="graph-canvas-wrap">
        <div id="cy" role="img" aria-label="dependency graph canvas"></div>
        <div id="graph-table-wrap" hidden>
          <table id="graph-table" aria-label="deployables with dependency counts">
            <thead>
              <tr>
                <th data-sort="name" scope="col">deployable</th>
                <th data-sort="status" scope="col">status</th>
                <th data-sort="team" scope="col">team</th>
                <th data-sort="outgoing" scope="col" class="numeric">depends on</th>
                <th data-sort="incoming" scope="col" class="numeric">depended on by</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <aside id="graph-detail" class="graph-detail" hidden aria-live="polite">
        </aside>
      </div>
    </section>
  </div>
</div>

<div id="status-bar">
  <span id="status-count">loading...</span>
  <span id="status-error"></span>
  <span class="shortcuts">
    <span><kbd>/</kbd> search</span>
    <span><kbd>n</kbd> new</span>
    <span><kbd>esc</kbd> cancel</span>
    <span><kbd>enter</kbd> save</span>
  </span>
</div>

<script src="/static/vendor/cytoscape.min.js"></script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
