<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>groundwork</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: #2a2a2a;
      --accent: #4ade80;
      --accent-dim: #16a34a;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --error: #f87171;
      --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      background: var(--bg2);
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    #search {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      border-radius: 3px;
    }

    #search:focus {
      border-color: var(--accent-dim);
    }

    #search::placeholder {
      color: var(--text-dim);
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    #new-app-form {
      display: none;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      align-items: center;
      gap: 10px;
    }

    #new-app-form.visible {
      display: flex;
    }

    #new-app-form label {
      color: var(--accent);
      font-size: 12px;
    }

    #new-app-name {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--accent-dim);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 8px;
      outline: none;
      border-radius: 3px;
    }

    #new-app-name:focus {
      border-color: var(--accent);
    }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
    }

    #app-list {
      list-style: none;
    }

    .app-row {
      border-bottom: 1px solid var(--border);
    }

    .app-row-header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.1s;
    }

    .app-row-header:hover {
      background: var(--bg2);
    }

    .app-row.expanded .app-row-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .app-name {
      flex: 1;
      font-weight: 500;
    }

    .app-id {
      color: var(--text-dim);
      font-size: 11px;
    }

    .expand-icon {
      color: var(--text-dim);
      font-size: 11px;
      width: 12px;
    }

    .app-row.expanded .expand-icon::before { content: '▼'; }
    .app-row:not(.expanded) .expand-icon::before { content: '▶'; }

    .app-detail {
      display: none;
      padding: 16px 20px 16px 44px;
      background: var(--bg2);
      gap: 12px;
      flex-direction: column;
    }

    .app-row.expanded .app-detail {
      display: flex;
    }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .field-row label {
      width: 110px;
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 12px;
      padding-top: 5px;
    }

    .field-row input, .field-row textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 8px;
      outline: none;
      border-radius: 3px;
      resize: vertical;
    }

    .field-row input:focus, .field-row textarea:focus {
      border-color: var(--accent-dim);
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      padding-top: 4px;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    button:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dim);
      color: var(--bg);
    }

    button.danger:hover {
      border-color: var(--error);
      color: var(--error);
    }

    #status-bar {
      flex-shrink: 0;
      padding: 5px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }

    #status-bar .shortcuts {
      display: flex;
      gap: 16px;
    }

    #status-bar .shortcuts kbd {
      color: var(--accent);
    }

    #status-error {
      color: var(--error);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<header>
  <h1>groundwork</h1>
  <input id="search" type="text" placeholder="/ to search..." autocomplete="off" spellcheck="false" />
</header>

<main>
  <div id="new-app-form">
    <label>new app:</label>
    <input id="new-app-name" type="text" placeholder="name..." autocomplete="off" spellcheck="false" />
    <span class="hint">enter to save · esc to cancel</span>
  </div>
  <ul id="app-list"></ul>
</main>

<div id="status-bar">
  <span id="status-count">loading...</span>
  <span id="status-error"></span>
  <span class="shortcuts">
    <span><kbd>/</kbd> search</span>
    <span><kbd>n</kbd> new</span>
    <span><kbd>esc</kbd> cancel</span>
    <span><kbd>enter</kbd> save</span>
  </span>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
