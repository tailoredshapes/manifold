image: rust:latest

variables:
  CARGO_TERM_COLOR: always

stages:
  - build
  - deploy

build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "**/*.rs"
        - "**/*.graphql"
        - "**/*.json"
        - "**/Cargo.toml"
        - Cargo.lock
    - when: never
  before_script:
    - rm -rf ../meshql-rs ../merkql
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/meshql-rs.git ../meshql-rs
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/merkql.git ../merkql
    - rustup component add clippy
  script:
    - cargo build --workspace
    - cargo test --workspace -- --test-threads=1
    - cargo clippy --workspace -- -D warnings
  cache:
    - key: "cargo-registry-v1"
      paths:
        - ~/.cargo/registry/
        - ~/.cargo/git/
      when: always
    - key:
        files: [Cargo.lock]
        prefix: "manifold-ws"
      paths: [target/]
      when: always

deploy:
  stage: deploy
  tags:
    - shell
  only:
    - main
  needs:
    - build
  script:
    - cd /tank/repos/tailoredshapes/manifold
    - git config --global --add safe.directory /tank/repos/tailoredshapes/manifold
    - git fetch origin
    - git checkout main
    - git reset --hard origin/main
    - docker compose down
    - docker compose build
    - docker compose up -d
    - |
      echo "Waiting for services to be ready..."
      for svc in "Groundwork:3050" "Union:3051" "Cityhall:3052"; do
        name=${svc%%:*}
        port=${svc##*:}
        for i in $(seq 1 30); do
          if curl -sf http://localhost:${port}/health >/dev/null 2>&1; then
            echo "${name} ready after ${i}s"
            break
          fi
          sleep 1
        done
        curl -sf http://localhost:${port}/health | grep '"status":"ok"'
      done
    - echo "Deployed successfully"
