image: rust:latest

variables:
  CARGO_TERM_COLOR: always

stages:
  - build
  - deploy

build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "**/*.rs"
        - "**/*.graphql"
        - "**/*.json"
        - "**/Cargo.toml"
        - Cargo.lock
    - when: never
  before_script:
    - rm -rf ../meshql-rs ../merkql
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/meshql-rs.git ../meshql-rs
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/merkql.git ../merkql
    - rustup component add clippy
  script:
    - cargo build --workspace
    - cargo test --workspace
    - cargo clippy --workspace -- -D warnings
  cache:
    - key: "cargo-registry-v1"
      paths:
        - ~/.cargo/registry/
        - ~/.cargo/git/
      when: always
    - key:
        files: [Cargo.lock]
        prefix: "manifold-ws"
      paths: [target/]
      when: always

deploy:
  stage: deploy
  tags:
    - shell
  only:
    - main
  needs:
    - build
  variables:
    # Stable name so docker compose volumes persist across deploys regardless
    # of the runner's working directory.
    COMPOSE_PROJECT_NAME: manifold
  script:
    # Stage the build context under a path the runner user owns. The
    # Dockerfile's context is the *parent* of manifold/ because it COPYs
    # meshql-rs/ and merkql/ as siblings, so we need all three repos
    # co-located. Using $HOME so this works regardless of which user the
    # runner is registered under.
    - export DEPLOY_ROOT="$HOME/manifold-deploy"
    - mkdir -p "$DEPLOY_ROOT"
    - rsync -a --delete --exclude target --exclude .git "$CI_PROJECT_DIR"/ "$DEPLOY_ROOT/manifold/"
    - |
      for sibling in meshql-rs merkql; do
        if [ -d "$DEPLOY_ROOT/$sibling/.git" ]; then
          git -C "$DEPLOY_ROOT/$sibling" fetch --quiet origin
          git -C "$DEPLOY_ROOT/$sibling" reset --hard --quiet origin/HEAD
        else
          rm -rf "$DEPLOY_ROOT/$sibling"
          git clone --quiet "http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/${sibling}.git" "$DEPLOY_ROOT/$sibling"
        fi
      done
    - cd "$DEPLOY_ROOT/manifold"
    - docker compose down
    - docker compose build
    - docker compose up -d
    - |
      echo "Waiting for services to be ready..."
      for svc in "Groundwork:3050" "Union:3051" "Cityhall:3052" "Yard:3053"; do
        name=${svc%%:*}
        port=${svc##*:}
        for i in $(seq 1 30); do
          if curl -sf http://localhost:${port}/health >/dev/null 2>&1; then
            echo "${name} ready after ${i}s"
            break
          fi
          sleep 1
        done
        curl -sf http://localhost:${port}/health | grep '"status":"ok"'
      done
    - echo "Deployed successfully"
