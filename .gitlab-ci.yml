image: rust:latest

variables:
  CARGO_TERM_COLOR: always

stages:
  - build
  - deploy
  - publish

# ── Static JS type-check (JSDoc + tsc --checkJs) ──────────────────────────
# Runs in parallel with the Rust build. Catches missing imports, wrong
# call signatures, and undefined identifiers across the suite's static/*.js
# files — the class of bug that ate manifold-edge for a session because
# Rust's build couldn't see it.
typecheck-static:
  image: node:24-alpine
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "**/static/**/*.js"
        - "tsconfig.json"
        - "global.d.ts"
    - when: never
  script:
    - npx -y -p typescript@5 tsc -p tsconfig.json
  cache:
    - key: "npm-cache-v1"
      paths:
        - /root/.npm/
      when: always

build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "**/*.rs"
        - "**/*.graphql"
        - "**/*.json"
        - "**/Cargo.toml"
        - Cargo.lock
    - when: never
  before_script:
    - rm -rf ../meshql-rs ../merkql
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/meshql-rs.git ../meshql-rs
    - git clone http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/merkql.git ../merkql
    - rustup component add clippy
  script:
    - cargo build --workspace
    - cargo test --workspace
    - cargo clippy --workspace -- -D warnings
  cache:
    - key: "cargo-registry-v1"
      paths:
        - ~/.cargo/registry/
        - ~/.cargo/git/
      when: always
    - key:
        files: [Cargo.lock]
        prefix: "manifold-ws"
      paths: [target/]
      when: always

deploy:
  stage: deploy
  tags:
    - shell
  only:
    - main
  needs:
    - build
    # Also block on the static typecheck — a red tsc shouldn't deploy even
    # if the Rust build passes. The job is filtered by changes:, so when no
    # static files have moved it doesn't even create — gitlab tolerates the
    # missing dep via optional: true.
    - job: typecheck-static
      optional: true
  variables:
    # Stable name so docker compose volumes persist across deploys regardless
    # of the runner's working directory.
    COMPOSE_PROJECT_NAME: manifold
  script:
    # Stage the build context under a path the runner user owns. The
    # Dockerfile's context is the *parent* of manifold/ because it COPYs
    # meshql-rs/ and merkql/ as siblings, so we need all three repos
    # co-located. Using $HOME so this works regardless of which user the
    # runner is registered under.
    - export DEPLOY_ROOT="$HOME/manifold-deploy"
    - mkdir -p "$DEPLOY_ROOT"
    - rsync -a --delete --exclude target --exclude .git "$CI_PROJECT_DIR"/ "$DEPLOY_ROOT/manifold/"
    - |
      for sibling in meshql-rs merkql; do
        if [ -d "$DEPLOY_ROOT/$sibling/.git" ]; then
          git -C "$DEPLOY_ROOT/$sibling" fetch --quiet origin
          git -C "$DEPLOY_ROOT/$sibling" reset --hard --quiet origin/HEAD
        else
          rm -rf "$DEPLOY_ROOT/$sibling"
          git clone --quiet "http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/${sibling}.git" "$DEPLOY_ROOT/$sibling"
        fi
      done
    - cd "$DEPLOY_ROOT/manifold"
    - docker compose down
    - docker compose build
    - docker compose up -d
    - |
      echo "Waiting for services to be ready..."
      for svc in "Groundwork:3050" "Union:3051" "Cityhall:3052" "Yard:3053"; do
        name=${svc%%:*}
        port=${svc##*:}
        for i in $(seq 1 30); do
          if curl -sf http://localhost:${port}/health >/dev/null 2>&1; then
            echo "${name} ready after ${i}s"
            break
          fi
          sleep 1
        done
        curl -sf http://localhost:${port}/health | grep '"status":"ok"'
      done
    - echo "Deployed successfully"

# ── Per-app image publish (tag-triggered) ──────────────────────────────────
# On a version tag (vX.Y.Z), build each manifold app into a generic image and
# push it to the GitLab Container Registry. Image is generic manifold — config
# comes from env at deploy time. Clients pin a version and pull.
publish-images:
  stage: publish
  tags:
    - shell
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  parallel:
    matrix:
      - APP: [groundwork, union, cityhall, yard, manifold-ingest, manifold-lobby]
  script:
    # Per-APP staging dir so parallel matrix jobs on one shell runner don't
    # clobber each other's build context.
    - export STAGE="$HOME/manifold-publish-$APP"
    - mkdir -p "$STAGE"
    - rsync -a --delete --exclude target --exclude .git "$CI_PROJECT_DIR"/ "$STAGE/manifold/"
    - |
      for sib in meshql-rs merkql; do
        rm -rf "$STAGE/$sib"
        git clone --quiet "http://oauth2:${LOCAL_GITLAB_TOKEN}@192.168.7.42:8929/tailoredshapes/${sib}.git" "$STAGE/$sib"
      done
    # Tightened .dockerignore at the context root — the dev box's parent-dir
    # .dockerignore is untracked and absent here, so write one explicitly to
    # keep build-context transfer small (exclude examples, perf, target, .git).
    - |
      cat > "$STAGE/.dockerignore" <<'IGNORE'
      *
      !manifold/
      !meshql-rs/
      !merkql/
      **/target/
      **/.git/
      **/node_modules/
      meshql-rs/examples/
      meshql-rs/performance/
      IGNORE
    - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
    - docker build --build-arg APP="$APP" -t "$CI_REGISTRY_IMAGE/$APP:$CI_COMMIT_TAG" -f "$STAGE/manifold/Dockerfile" "$STAGE"
    - docker push "$CI_REGISTRY_IMAGE/$APP:$CI_COMMIT_TAG"
    - echo "Published $CI_REGISTRY_IMAGE/$APP:$CI_COMMIT_TAG"
    - echo "SRC_REGISTRY=$CI_REGISTRY"
