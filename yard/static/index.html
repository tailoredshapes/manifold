<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yard</title>

  <!-- Shared Manifold UI kit: design tokens + primitive component styles. -->
  <link rel="stylesheet" href="/static/manifold-ui.css" />

  <style>
    /* ── Yard-specific token extensions ───────────────────────────────── */
    :root {
      --kind-external: #f59e0b;
      --kind-mock:     #6b7280;
      --kind-stub:     #6b7280;
      --kind-multi:    #16a34a;
    }

    /* ── Yard-specific layout tweaks ──────────────────────────────────── */
    #search { width: 280px; }

    /* ── Product groups (Environments screen) ─────────────────────────── */
    .product-group + .product-group { margin-top: 28px; }
    .product-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .product-head .product-name {
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .product-head .product-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-soft);
      text-transform: none;
      letter-spacing: 0;
    }

    /* ── Environment card ─────────────────────────────────────────────── */
    .env-card {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .env-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-strong);
    }
    .env-card.expanded {
      cursor: default;
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(17,24,39,0.15);
    }
    .env-card .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .env-card .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Pill modifiers: test-environment kinds ───────────────────────── */
    .pill.k-external    { color: var(--kind-external); border-color: var(--kind-external); background: var(--warn-soft); }
    .pill.k-mock,
    .pill.k-stub        { color: var(--kind-mock);     border-color: var(--border-strong); }
    .pill.k-isolated,
    .pill.k-sandbox     { color: var(--text);          border: 1px solid var(--border); background: var(--ink-soft); }
    .pill.k-multi-tenant{ color: var(--kind-multi);    border-color: var(--kind-multi);    background: var(--success-soft); }

    /* ── Stat grid (env card body) ────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 12px;
    }
    .stat-grid .stat .lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .stat-grid .stat .val {
      font-size: 14px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .constraints {
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px dashed var(--border);
      padding-top: 8px;
    }

    .status-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .status-foot .id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-soft);
    }

    /* ── Availability dot ─────────────────────────────────────────────── */
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-soft);
      box-shadow: 0 0 0 2px var(--surface);
      vertical-align: middle;
    }
    .dot.s-available { background: var(--success); }
    .dot.s-cap       { background: var(--warn); }
    .dot.s-blocked   { background: var(--danger); }
    .dot.s-unknown   { background: var(--text-soft); }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .env-detail {
      display: none;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .env-card.expanded .env-detail { display: flex; }

    .history-block {
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
    }
    .history-block .stat-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    /* ── Badge modifiers: run statuses ────────────────────────────────── */
    .badge.s-passed    { color: var(--success); border-color: var(--success); background: var(--success-soft); }
    .badge.s-failed,
    .badge.s-errored   { color: var(--danger);  border-color: var(--danger);  background: var(--danger-soft); }
    .badge.s-running   { color: var(--text);    border-color: var(--ink);     background: var(--ink-soft); }
    .badge.s-cancelled { color: var(--text-muted); border-color: var(--border-strong); }
    .badge.s-pending   { color: var(--warn);    border-color: var(--warn);    background: var(--warn-soft); }

    /* ── Chip modifiers: sync kinds ───────────────────────────────────── */
    .chip.k-push   { color: var(--text);    border-color: var(--ink); }
    .chip.k-pull   { color: var(--success); border-color: var(--success); }
    .chip.k-shared { color: var(--warn);    border-color: var(--warn); }

    .callout {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Sync dashboard ───────────────────────────────────────────────── */
    .sync-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      align-items: stretch;
    }
    @media (max-width: 900px) { .sync-grid { grid-template-columns: 1fr; } }

    .sync-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sync-panel .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sync-panel select { font-size: 13px; }

    .chart-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
    }
    .chart-frame svg { display: block; width: 100%; height: auto; }
    .chart-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .chart-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 8px;
    }
    .chart-legend .swatch {
      display: inline-block;
      width: 14px;
      height: 2px;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="hub-row">
        <a class="hub-link" href="https://manifold.tildarc.com">Manifold</a>
        <span class="hub-sep" aria-hidden="true">·</span>
        <span>yard</span>
      </div>
      <h1>Yard</h1>
      <span class="subtitle">test coordinator</span>
    </div>

    <nav class="tabs" id="primary-nav">
      <button class="tab active" data-screen="environments">Environments</button>
      <button class="tab" data-screen="runs">Runs</button>
      <button class="tab" data-screen="sync">Sync</button>
    </nav>

    <div class="header-actions">
      <input id="search" type="search" placeholder="Search ( / )" autocomplete="off" spellcheck="false" />
      <button id="btn-new" class="primary" title="New (n)">New</button>
      <div class="menu-host">
        <button id="btn-settings" class="ghost">Settings</button>
        <div id="settings-menu" class="menu" role="menu">
          <div class="menu-heading">Configuration</div>
          <button class="menu-item" data-screen="settings:testInfrastructures">Infrastructure</button>
          <button class="menu-item" data-screen="settings:mockSources">Mock sources</button>
          <button class="menu-item" data-screen="settings:dataSources">Data sources</button>
          <button class="menu-item" data-screen="settings:testSuites">Test suites</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="page" id="screen-root"></div>
</main>

<footer class="shortcuts">
  <span><kbd>/</kbd> search</span>
  <span><kbd>n</kbd> new</span>
  <span><kbd>esc</kbd> cancel</span>
  <span id="footer-meta" style="margin-left:auto"></span>
</footer>

<div id="status-strip" role="status" aria-live="polite"></div>

<!-- No persistent modal scaffold — manifold-ui's openModal() builds and
     removes its own DOM on demand. -->

<script type="module" src="/static/app.js"></script>
</body>
</html>
