<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yard</title>
  <style>
    /* ── Shared design tokens (Manifold suite) ─────────────────────────── */
    :root {
      --bg:            #f9fafb;
      --surface:       #ffffff;
      --surface-alt:   #f3f4f6;
      --text:          #111827;
      --text-muted:    #6b7280;
      --text-soft:     #9ca3af;
      --border:        #e5e7eb;
      --border-strong: #d1d5db;
      --border-soft:   #f3f4f6;

      --ink:        #111827;
      --ink-hover:  #1f2937;
      --ink-soft:   #f3f4f6;
      --ink-faint:  #e5e7eb;

      --success:       #16a34a;
      --success-soft:  #dcfce7;
      --warn:          #f59e0b;
      --warn-soft:     #fef3c7;
      --danger:        #dc2626;
      --danger-soft:   #fee2e2;

      --kind-external: #f59e0b;
      --kind-mock:     #6b7280;
      --kind-stub:     #6b7280;
      --kind-multi:    #16a34a;

      --radius:    8px;
      --radius-sm: 6px;
      --gutter:    24px;
      --max-w:     1200px;

      --font-sans:  ui-sans-serif, system-ui, -apple-system, "SF Pro Text", "Inter", sans-serif;
      --font-mono:  ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;
      --font-serif: "Iowan Old Style", "Palatino", Georgia, serif;

      --shadow-sm:  0 1px 2px rgba(17,24,39,0.04);
      --shadow-md:  0 4px 12px rgba(17,24,39,0.06);
      --transition: 120ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--text-muted);
    }
    a:hover { text-decoration-color: var(--text); }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .page {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--gutter);
    }

    /* ── Top bar ───────────────────────────────────────────────────────── */
    header.topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 0 0;
    }
    .topbar-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: flex-end;
      gap: 32px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    .brand .hub-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 2px;
      font-size: 12px;
      color: var(--muted, #6b7280);
    }
    .brand .hub-link {
      color: inherit;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 120ms;
    }
    .brand .hub-link:hover { color: var(--ink, #111827); }
    .brand .hub-sep { color: var(--border, #e5e7eb); user-select: none; }
    .brand h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .brand .subtitle {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    nav.tabs {
      flex: 1;
      align-self: stretch;
      display: flex;
      align-items: flex-end;
      border-bottom: 1px solid transparent;
    }
    nav.tabs .tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 10px 4px;
      margin-right: 22px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    nav.tabs .tab:last-child { margin-right: 0; }
    nav.tabs .tab:hover { color: var(--text); background: transparent; }
    nav.tabs .tab.active {
      color: var(--text);
      border-bottom-color: var(--ink);
      background: transparent;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="text"], input[type="search"], select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type="text"]:focus, input[type="search"]:focus, select:focus, textarea:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(17,24,39,0.15);
    }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(17,24,39,0.15);
    }

    #search { width: 280px; }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition), color var(--transition);
    }
    button:hover {
      background: var(--surface-alt);
      box-shadow: var(--shadow-sm);
    }
    button.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }
    button.primary:hover {
      background: var(--ink-hover);
      border-color: var(--ink-hover);
      color: #fff;
    }
    button.danger {
      color: var(--danger);
      border-color: var(--border);
    }
    button.danger:hover {
      background: var(--danger-soft);
      border-color: var(--danger);
    }
    button.ghost {
      border-color: transparent;
      color: var(--text-muted);
    }
    button.ghost:hover { color: var(--text); background: var(--surface-alt); box-shadow: none; }

    /* ── Settings overflow menu ────────────────────────────────────────── */
    .menu-host { position: relative; }
    .menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      min-width: 200px;
      padding: 6px;
      z-index: 50;
      display: none;
    }
    .menu.open { display: block; }
    .menu .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
    }
    .menu .menu-item:hover { background: var(--surface-alt); }
    .menu .menu-heading {
      padding: 8px 10px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    main {
      padding: 28px 0 60px;
      flex: 1;
    }

    h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
    h2 { font-size: 18px; font-weight: 600; }
    h3 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .section-head .meta { color: var(--text-muted); font-size: 13px; }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .env-card {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .env-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-strong);
    }
    .env-card.expanded {
      cursor: default;
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(17,24,39,0.15);
    }

    .env-card .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .env-card .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface);
      text-transform: lowercase;
      white-space: nowrap;
    }
    .pill.k-external    { color: var(--kind-external); border-color: var(--kind-external); background: var(--warn-soft); }
    .pill.k-mock,
    .pill.k-stub        { color: var(--kind-mock);     border-color: var(--border-strong); }
    .pill.k-isolated,
    .pill.k-sandbox     { color: var(--text);          border: 1px solid var(--border); background: var(--ink-soft); }
    .pill.k-multi-tenant{ color: var(--kind-multi);    border-color: var(--kind-multi);    background: var(--success-soft); }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 12px;
    }
    .stat-grid .stat .lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .stat-grid .stat .val {
      font-size: 14px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .constraints {
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px dashed var(--border);
      padding-top: 8px;
    }

    .status-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .status-foot .id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-soft);
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-soft);
      box-shadow: 0 0 0 2px var(--surface);
      vertical-align: middle;
    }
    .dot.s-available { background: var(--success); }
    .dot.s-cap       { background: var(--warn); }
    .dot.s-blocked   { background: var(--danger); }
    .dot.s-unknown   { background: var(--text-soft); }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .env-detail {
      display: none;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .env-card.expanded .env-detail { display: flex; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
    }
    .form-grid .field { display: flex; flex-direction: column; gap: 4px; }
    .form-grid .field label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-grid .field input,
    .form-grid .field select,
    .form-grid .field textarea {
      font-size: 13px;
      padding: 6px 8px;
    }
    .form-grid .field.full { grid-column: span 2; }

    .row-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .history-block {
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
    }
    .history-block .stat-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    /* ── Tables ────────────────────────────────────────────────────────── */
    .table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .table th, .table td {
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }
    .table th {
      background: var(--surface-alt);
      font-weight: 600;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .table tbody tr:nth-child(even) { background: var(--surface-alt); }
    .table tbody tr:hover { background: var(--ink-soft); cursor: pointer; }
    .table tbody tr.expanded { background: var(--ink-soft); }
    .table tbody tr.detail-row,
    .table tbody tr.detail-row:hover {
      background: var(--surface);
      cursor: default;
    }
    .table .muted { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface);
      text-transform: lowercase;
      white-space: nowrap;
    }
    .badge.s-passed    { color: var(--success); border-color: var(--success); background: var(--success-soft); }
    .badge.s-failed,
    .badge.s-errored   { color: var(--danger);  border-color: var(--danger);  background: var(--danger-soft); }
    .badge.s-running   { color: var(--text);    border-color: var(--ink);     background: var(--ink-soft); }
    .badge.s-cancelled { color: var(--text-muted); border-color: var(--border-strong); }
    .badge.s-pending   { color: var(--warn);    border-color: var(--warn);    background: var(--warn-soft); }

    /* ── Underline tabs (filters) ──────────────────────────────────────── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .filter-pill {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 8px 4px;
      margin-right: 18px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .filter-pill:hover { color: var(--text); background: transparent; box-shadow: none; }
    .filter-pill.active {
      color: var(--text);
      border-bottom-color: var(--ink);
      background: transparent;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-right: 4px;
    }
    .chip.k-push   { color: var(--text);    border-color: var(--ink); }
    .chip.k-pull   { color: var(--success); border-color: var(--success); }
    .chip.k-shared { color: var(--warn);    border-color: var(--warn); }

    .callout {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Sync dashboard ────────────────────────────────────────────────── */
    .sync-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      align-items: stretch;
    }
    @media (max-width: 900px) { .sync-grid { grid-template-columns: 1fr; } }

    .sync-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sync-panel .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sync-panel select { font-size: 13px; }

    .chart-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
    }
    .chart-frame svg { display: block; width: 100%; height: auto; }
    .chart-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .chart-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 8px;
    }
    .chart-legend .swatch {
      display: inline-block;
      width: 14px;
      height: 2px;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── Empty / generic ───────────────────────────────────────────────── */
    .empty {
      padding: 36px 16px;
      text-align: center;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .empty-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      max-width: 480px;
      margin: 32px auto;
    }
    .empty-card .empty-mark {
      display: block;
      font-family: var(--font-serif);
      font-size: 32px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .empty-card h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .empty-card .lede {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 16px;
    }
    .empty-card .hint { font-size: 12px; color: var(--text-muted); }
    .empty-card .hint kbd {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--text);
    }

    /* ── Settings panes (simple CRUD) ──────────────────────────────────── */
    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .settings-list .row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .settings-list .row:last-child { border-bottom: none; }
    .settings-list .row .meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .settings-list .row.expanded {
      background: var(--surface-alt);
      grid-template-columns: 1fr;
    }

    /* ── Status strip (errors) ─────────────────────────────────────────── */
    #status-strip {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-muted);
      display: none;
      z-index: 80;
    }
    #status-strip.error {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-soft);
      display: block;
    }
    #status-strip.info { display: block; }

    /* ── New record modal ──────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.30);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      width: min(560px, 92vw);
      max-height: 88vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal h2 { margin-bottom: 12px; }
    .modal .form-grid { grid-template-columns: 1fr 1fr; }
    .modal .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .kbd {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 1px 5px;
      border: 1px solid var(--border-strong);
      border-bottom-width: 2px;
      border-radius: 4px;
      color: var(--text);
      background: var(--surface);
    }

    /* ── Footer keyboard hint bar (matches Union) ──────────────────────── */
    footer.shortcuts {
      max-width: var(--max-w);
      margin: 0 auto;
      width: 100%;
      padding: 16px 24px 24px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    footer.shortcuts kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--text);
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="hub-row">
        <a class="hub-link" href="https://manifold.tildarc.com">Manifold</a>
        <span class="hub-sep" aria-hidden="true">·</span>
        <span>yard</span>
      </div>
      <h1>Yard</h1>
      <span class="subtitle">test coordinator</span>
    </div>

    <nav class="tabs" id="primary-nav">
      <button class="tab active" data-screen="environments">Environments</button>
      <button class="tab" data-screen="runs">Runs</button>
      <button class="tab" data-screen="sync">Sync</button>
    </nav>

    <div class="header-actions">
      <input id="search" type="search" placeholder="Search ( / )" autocomplete="off" spellcheck="false" />
      <button id="btn-new" class="primary" title="New (n)">New</button>
      <div class="menu-host">
        <button id="btn-settings" class="ghost">Settings</button>
        <div id="settings-menu" class="menu" role="menu">
          <div class="menu-heading">Configuration</div>
          <button class="menu-item" data-screen="settings:testInfrastructures">Infrastructure</button>
          <button class="menu-item" data-screen="settings:mockSources">Mock sources</button>
          <button class="menu-item" data-screen="settings:dataSources">Data sources</button>
          <button class="menu-item" data-screen="settings:testSuites">Test suites</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="page" id="screen-root"></div>
</main>

<footer class="shortcuts">
  <span><kbd>/</kbd> search</span>
  <span><kbd>n</kbd> new</span>
  <span><kbd>esc</kbd> cancel</span>
  <span id="footer-meta" style="margin-left:auto"></span>
</footer>

<div id="status-strip" role="status" aria-live="polite"></div>

<div id="modal-root" class="modal-backdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <h2 id="modal-title">New record</h2>
    <div id="modal-fields" class="form-grid"></div>
    <div class="hint">Press <span class="kbd">Enter</span> to save · <span class="kbd">Esc</span> to cancel</div>
    <div class="actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save" class="primary">Save</button>
    </div>
  </div>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
